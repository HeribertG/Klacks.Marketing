name: Deploy Klacks.Marketing to Hetzner

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-klacks-marketing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          set -e
          echo "Deploying Klacks.Marketing..."

          cd /root/apps

          echo "Updating Klacks.Api repo (for docker-compose + nginx config)..."
          if [ -d "Klacks.Api" ]; then
            cd Klacks.Api
            git remote set-url origin https://github.com/HeribertG/Klacks.Api.git 2>/dev/null || true
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
            cd ..
          fi

          if [ -d "Klacks.Marketing" ]; then
            echo "Updating Klacks.Marketing..."
            cd Klacks.Marketing
            git remote set-url origin https://github.com/HeribertG/Klacks.Marketing.git 2>/dev/null || true
            git fetch origin
            git reset --hard origin/main
            cd ..
          else
            echo "Cloning Klacks.Marketing..."
            git clone https://github.com/HeribertG/Klacks.Marketing.git
          fi

          ln -sfn /root/apps/Klacks.Marketing /root/apps/Klacks.Api/Klacks.Marketing

          echo "Stopping old Klacks.Marketing container..."
          docker stop klacks-marketing 2>/dev/null || true
          docker rm -f klacks-marketing 2>/dev/null || true

          echo "Building Klacks.Marketing Docker image..."
          cd Klacks.Marketing
          docker build -t klacks-marketing -f Dockerfile .
          cd ..

          echo "Starting Klacks.Marketing..."
          docker run -d \
            --name klacks-marketing \
            --restart unless-stopped \
            --network apps_klacks_network \
            --network-alias klacks-marketing \
            -e ASPNETCORE_ENVIRONMENT=Production \
            -e ASPNETCORE_URLS=http://+:80 \
            --expose 80 \
            klacks-marketing

          echo "Reloading nginx proxy..."
          docker exec klacks-proxy nginx -s reload 2>/dev/null || true

          echo "Klacks.Marketing deployment completed!"

          sleep 10
          echo "Health Check..."

          if docker ps --filter "name=klacks-marketing" --filter "status=running" | grep -q "klacks-marketing"; then
            echo "Container is running"
          else
            echo "Container is not running"
            docker logs klacks-marketing --tail=20
            exit 1
          fi
